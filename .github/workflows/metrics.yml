name: Metrics Aesthetic Premium
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Hend1kaGH # Sudah disesuaikan dengan GitHub Anda
          config_timezone: Asia/Jakarta
          
          # ==========================================
          # PENGATURAN TAMPILAN (TEMA MODERN)
          # ==========================================
          template: classic
          config_theme: tokyonight # Menggunakan tema Tokyonight yang sangat elegan
          config_animations: yes
          
          # Kita matikan teks statistik bawaan yang terlalu padat di gambar sebelumnya
          base: header, metadata
          base_indepth: yes

          # ==========================================
          # VISUAL 1: KALENDER KONTRIBUSI 3D (ISOMETRIC)
          # ==========================================
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # ==========================================
          # VISUAL 2: GRAFIK BAHASA PEMROGRAMAN MODERN
          # ==========================================
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_categories: programming # Hanya menampilkan bahasa pemrograman murni

          # ==========================================
          # VISUAL 3: DIAGRAM KEBIASAAN NGODING
          # ==========================================
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ==========================================
          # VISUAL 4: BADGES PENCAPAIAN MINI
          # ==========================================
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
